<div class="container mt-5 text-right custom-pantry-wrapper" dir="rtl">
    <div class="card shadow p-4 mb-4 bg-light main-search-card">
        <div class="position-relative mb-3">
            <div class="search-header mb-4 text-center">
                <div class="chef-icon-container mb-2">
                    <i class="bi bi-mortarboard-fill orange-chef-icon"></i>
                </div>
                <h2 class="fw-bold text-dark main-title">מה נבשל היום?</h2>
                <div class="orange-divider mx-auto"></div> <p class="text-muted mt-3">הוסיפו את הרכיבים שיש לכם במקרר ונמצא לכם את השילוב המושלם</p>
            </div>

            <div class="position-relative mb-4">
                <div class="input-group shadow-sm custom-search-bar">
                    <span class="input-group-text bg-white border-start-0"><i class="bi bi-magic magic-icon"></i></span>
                    <input type="text" [(ngModel)]="ingredientInput" (input)="onInputChange()"
                        (keyup.enter)="addIngredient()" class="form-control border-end-0 shadow-none"
                        placeholder="הקלידו רכיב (למשל: תפוחי אדמה, סילאן...)">
                    <button class="btn btn-primary px-4 fw-bold orange-btn" (click)="addIngredient()">
                        <i class="bi bi-plus-lg me-1"></i> הוסף
                    </button>
                </div>

                <ul class="list-group position-absolute w-100 shadow-lg suggestions-dropdown"
                    *ngIf="filteredSuggestions.length > 0">
                    <li *ngFor="let sug of filteredSuggestions" (click)="addIngredient(sug)"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        {{ sug }}
                        <span class="badge bg-light text-dark"><i class="bi bi-arrow-return-left"></i></span>
                    </li>
                </ul>
            </div>

            <div class="common-ingredients mb-4">
                <small class="text-muted d-block mb-2 fw-bold">רכיבים נפוצים במטבח:</small>
                <div class="d-flex flex-wrap gap-2">
                    <button *ngFor="let common of ['בצל', 'שום', 'שמן זית', 'עגבניה', 'ביצים', 'מלח', 'פלפל', 'אורז', 'גבינה', 'תפוחי אדמה', 'קמח', 'סוכר', 'קוקוס']"
                        (click)="addIngredient(common)" class="btn btn-sm btn-light border-dashed rounded-pill common-tag">
                        + {{ common }}
                    </button>
                </div>
            </div>
        </div>

        <p class="small text-muted mb-2" *ngIf="myIngredients.length > 0">
            💡 טיפ: לחצו על רכיב כדי לסמן אותו כ<b>רכיב חובה</b> (⭐)
        </p>
        
        <div class="d-flex flex-wrap mb-4">
            <div *ngFor="let ing of myIngredients; let i = index" class="m-1 chip-container">
                <button class="btn btn-sm shadow-sm pantry-chip"
                    [ngClass]="mustHaveIngredients.includes(ing) ? 'btn-warning' : 'btn-outline-secondary'"
                    (click)="toggleMustHave(ing)">
                    {{ ing }}
                    <i *ngIf="mustHaveIngredients.includes(ing)" class="bi bi-star-fill text-white small ms-1"></i>
                </button>
                <span (click)="removeIngredient(i)" class="text-danger pointer ms-1 delete-chip">&times;</span>
            </div>
        </div>

        <button class="btn btn-success btn-lg w-100 shadow-sm main-action-btn" (click)="performSearch()"
            [disabled]="isLoading || myIngredients.length === 0">
            {{ isLoading ? 'מנתח נתונים...' : 'מצא לי מה לבשל!' }}
        </button>
    </div>

    <div id="results-section" class="row g-4" *ngIf="!isLoading && searchResults.length > 0">
        <div class="col-md-6 col-lg-4" *ngFor="let res of searchResults">
            <div class="card recipe-card h-100 shadow-sm border-0">
                <div class="match-badge" [ngStyle]="{'background': getScoreColor(res.score)}">
                    {{ res.score }}% התאמה
                </div>
                <img [src]="res.image_path || 'assets/default.jpg'" class="card-img-top recipe-img" [alt]="res.title">
                <div class="card-body d-flex flex-column p-4">
                    <h5 class="card-title fw-bold text-dark mb-3">{{ res.title }}</h5>
                    <div class="progress mb-3" style="height: 6px; border-radius: 10px;">
                        <div class="progress-bar" role="progressbar" 
                             [style.width]="res.score + '%'" 
                             [ngStyle]="{'background-color': getScoreColor(res.score)}"></div>
                    </div>
                    <div class="ingredients-info mb-3 flex-grow-1">
                        <div class="text-success small mb-2 fw-bold">
                            <i class="bi bi-check-circle-fill me-1"></i> יש לכם: {{ res.have.slice(0, 3).join(', ') }}
                        </div>
                        <div class="text-danger small fw-bold" *ngIf="res.missing.length > 0">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i> חסר: {{ res.missing.slice(0, 2).join(', ') }}
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 rounded-pill shadow-sm view-recipe-btn" [routerLink]="['/recipe', res.id]">
                        למתכון המלא <i class="bi bi-arrow-left ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
