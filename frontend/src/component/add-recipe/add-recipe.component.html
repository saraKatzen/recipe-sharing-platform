<div class="add-recipe-container card-shadow">
  <h2 class="text-center mb-4">
    {{ isEditMode ? 'עריכת מתכון: ' + recipeForm.value.title : 'הוספת מתכון חדש' }}
  </h2>
  <form [formGroup]="recipeForm" (ngSubmit)="onSubmit()">
    <div class="form-group mb-3">
      <label>שם המתכון:</label>
      <input type="text" formControlName="title" class="form-control" placeholder="למשל: עוגת שוקולד עשירה">
    </div>
    <div class="row mb-3">
      <div class="col-md-3">
        <label>קטגוריה:</label>
        <select formControlName="category" class="form-control">
          <option value="">בחר קטגוריה</option>
          <option value="עוגות">עוגות</option>
          <option value="עוגיות">עוגיות</option>
          <option value="מנה עיקרית">מנה עיקרית</option>
          <option value="קינוחים">קינוחים</option>
          <option value="סלטים">סלטים</option>
        </select>
      </div>
      <div class="col-md-4">
        <label>זמן הכנה (בדקות):</label>
        <input type="number" formControlName="prep_time" class="form-control" placeholder="למשל: 45">
      </div>
      <div class="col-md-4">
        <label>סוג מנה:</label>
        <select formControlName="type" class="form-control">
          <option value="פרווה">פרווה</option>
          <option value="בשרי">בשרי</option>
          <option value="חלבי">חלבי</option>
        </select>
      </div>
    </div>
    <div class="ingredients-section mb-4">
      <label>רכיבים:</label>
      <div formArrayName="ingredients">
        <div *ngFor="let ing of ingredients.controls; let i = index" [formGroupName]="i" class="ingredient-row mb-2">
          <input type="text" formControlName="product" placeholder="מוצר" class="form-control-sm">
          <input type="number" formControlName="amount" placeholder="כמות" class="form-control-sm">
          <input type="text" formControlName="unit" placeholder="יחידה" class="form-control-sm">
          <button type="button" class="btn-remove" (click)="removeIngredient(i)">✖</button>
        </div>
      </div>
      <button type="button" class="btn-add-ing mt-2" (click)="addIngredient()">+ הוסף רכיב</button>
    </div>
    <div class="form-group mb-3">
      <label>הוראות הכנה:</label>
      <textarea formControlName="instructions" class="form-control" rows="5"></textarea>
    </div>
    <div class="form-group mb-4">
      <label>תמונת המתכון:</label>
      <input type="file" (change)="onFileSelected($event)" class="form-control">
      <small class="text-muted" *ngIf="isEditMode">העלי תמונה חדשה רק אם ברצונך להחליף את הקיימת</small>
    </div>
    <button type="submit" [disabled]="recipeForm.invalid" class="btn-submit-main">
      {{ isEditMode ? 'עדכן מתכון ושמור שינויים' : 'פרסם מתכון חדש' }}
    </button>
  </form>
</div>
