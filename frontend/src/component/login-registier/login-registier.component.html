<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    
    <div class="card shadow-lg">
      <div class="card-header text-center bg-primary text-white">
        <h3>{{ isLoginMode ? 'כניסה למערכת' : 'הרשמה למערכת' }}</h3>
      </div>
      
      <div class="card-body">
        
        <form (ngSubmit)="onSubmit()">
          
          <div class="mb-3">
            <label for="email" class="form-label">דואר אלקטרוני:</label>
            <input type="email" 
                   id="email" 
                   class="form-control" 
                   required 
                   [(ngModel)]="email" 
                   name="email"
                   placeholder="example@mail.com">
          </div>

          <div class="mb-3" *ngIf="!isLoginMode">
            <label for="username" class="form-label">שם מלא:</label>
            <input type="text" 
                   id="username" 
                   class="form-control" 
                   [required]="!isLoginMode" 
                   [(ngModel)]="username" 
                   name="username">
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label">סיסמה:</label>
            <input type="password" 
                   id="password" 
                   class="form-control" 
                   required 
                   [(ngModel)]="password" 
                   name="password">
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger text-center">
            {{ errorMessage }}
          </div>
          
          <div class="d-grid gap-2 mb-3">
            <button type="submit" class="btn btn-success">
              {{ isLoginMode ? 'כניסה' : 'הרשמה' }}
            </button>
          </div>
        </form>
        
      </div>
      
      <div class="card-footer text-center">
        <a style="cursor: pointer; text-decoration: underline; color: blue;" (click)="onSwitchMode()">
          {{ isLoginMode ? 'אין לך חשבון? לחץ כאן להרשמה' : 'יש לך כבר חשבון? לחץ כאן לכניסה' }}
        </a>
      </div>
      
    </div>
  </div>
</div>
